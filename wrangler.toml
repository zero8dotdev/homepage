name = "zero8-homepage"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
main = "./.cloudflare/worker.js"
workers_dev = true

[[routes]]
pattern = "zero8.dev/*"
zone_name = "zero8.dev"

[[routes]]
pattern = "www.zero8.dev/*"
zone_name = "zero8.dev"

[assets]
directory = "./.cloudflare/public"
binding = "ASSETS"

